<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Iniciar Sesion{% endblock %} | ISO27001</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #312e81 100%);
            padding: 2rem;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 24px;
            padding: 2.5rem 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #4f46e5, #818cf8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 12px 32px rgba(79, 70, 229, 0.45);
        }

        .login-icon i {
            font-size: 2rem;
            color: white;
        }

        .login-brand h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }

        .login-brand p {
            color: #64748b;
            font-size: 0.95rem;
        }

        .alert-error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 0.875rem 1rem;
            color: #991b1b;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4);
        }

        .demo-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
        }

        .demo-section h4 {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        .demo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            font-size: 0.9rem;
        }

        .demo-item span:first-child {
            color: #64748b;
        }

        .demo-item code {
            background: #f1f5f9;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #0f172a;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1>ISO 27001</h1>
                <p>Sistema de Evaluacion y Gestion</p>
            </div>

            {% if error %}
            <div class="alert-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                
                <div class="form-group">
                    <label for="email">Correo electronico</label>
                    <input type="email" id="email" name="email" required autofocus placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <input type="password" id="password" name="password" required placeholder="Tu contrasena">
                </div>

                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Iniciar Sesion
                </button>
            </form>

            <div class="demo-section">
                <h4>Credenciales de prueba</h4>
                <div class="demo-item">
                    <span>Superadmin:</span>
                    <code>admin@iso27001.local</code>
                </div>
                <div class="demo-item">
                    <span>Password:</span>
                    <code>admin123</code>
                </div>
            </div>

            <div class="footer-note">
                ISO 27001:2022 | ISO 9001 | ISO 20000 | ISO 22301
            </div>
        </div>
    </div>
</body>
</html>
