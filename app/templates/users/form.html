{% extends "base.html" %}
{% block title %}{{ 'Editar' if edit_user else 'Nuevo' }} Usuario{% endblock %}

{% block content %}
<h1>{{ 'Editar' if edit_user else 'Nuevo' }} Usuario</h1>
<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label for="name">Nombre *</label>
    <input type="text" id="name" name="name" value="{{ edit_user.name if edit_user else '' }}" required>

    <label for="email">Email *</label>
    <input type="email" id="email" name="email" value="{{ edit_user.email if edit_user else '' }}" required>
    {% if errors and errors.email %}<p class="error-text">{{ errors.email }}</p>{% endif %}

    <label for="role">Rol *</label>
    <select id="role" name="role" required>
        {% for role in roles %}
        <option value="{{ role }}" {% if edit_user and edit_user.role.value == role %}selected{% endif %}>{{ role }}</option>
        {% endfor %}
    </select>

    <label for="password">Contrasena {{ '*' if not edit_user else '(dejar vacio para no cambiar)' }}</label>
    <input type="password" id="password" name="password" {{ 'required' if not edit_user else '' }}>

    <div class="form-actions">
        <button type="submit" class="primary">{{ 'Guardar' if edit_user else 'Crear' }}</button>
        <a href="/clients/{{ client_id }}/users" class="button outline">Cancelar</a>
    </div>
</form>
{% endblock %}
